<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solstice Afternoon Menu</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="app-shell">
        <header>
            <div class="location">
                <i class="fa-solid fa-location-dot"></i>
                <span>Main St. Terrace</span>
            </div>
            <div class="profile-pic">
                <img src="https://ui-avatars.com/api/?name=User&background=D35400&color=fff" alt="User">
            </div>
        </header>

        <section class="hero">
            <h1>Good Afternoon!</h1>
            <p>Ready for a light bite?</p>
        </section>

        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search salads or snacks...">
        </div>

        <div class="filter-scroll">
            <div class="chip active">All</div>
            <div class="chip">Salads</div>
            <div class="chip">Sandwiches</div>
            <div class="chip">Coolers</div>
            <div class="chip">Pastry</div>
        </div>

        <div class="menu-container">
            <div class="menu-card">
                <div class="img-box">
                    <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?q=80&w=400" alt="Salad">
                    <div class="wishlist"><i class="fa-regular fa-heart"></i></div>
                </div>
                <div class="details">
                    <h3>Summer Harvest Bowl</h3>
                    <div class="meta-info">
                        <span><i class="fa-solid fa-leaf"></i> Vegan</span>
                        <span><i class="fa-solid fa-star"></i> 4.9</span>
                    </div>
                    <div class="price-row">
                        <span class="price">$14.00</span>
                        <div class="add-btn">+</div>
                    </div>
                </div>
            </div>

            <div class="menu-card">
                <div class="img-box">
                    <img src="https://images.unsplash.com/photo-1525351484163-7529414344d8?q=80&w=400" alt="Avocado Toast">
                </div>
                <div class="details">
                    <h3>Smashed Avo Toast</h3>
                    <div class="meta-info">
                        <span><i class="fa-solid fa-clock"></i> 10 min</span>
                        <span><i class="fa-solid fa-star"></i> 4.7</span>
                    </div>
                    <div class="price-row">
                        <span class="price">$12.50</span>
                        <div class="add-btn">+</div>
                    </div>
                </div>
            </div>

            <div class="menu-card">
                <div class="img-box">
                    <img src="https://images.unsplash.com/photo-1517701604599-bb29b565090c?q=80&w=400" alt="Iced Latte">
                </div>
                <div class="details">
                    <h3>Vanilla Iced Latte</h3>
                    <div class="meta-info">
                        <span><i class="fa-solid fa-droplet"></i> Cold</span>
                        <span><i class="fa-solid fa-star"></i> 4.8</span>
                    </div>
                    <div class="price-row">
                        <span class="price">$5.50</span>
                        <div class="add-btn">+</div>
                    </div>
                </div>
            </div>

             <div class="menu-card">
                <div class="img-box">
                    <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff?q=80&w=400" alt="Croissant">
                </div>
                <div class="details">
                    <h3>Almond Croissant</h3>
                    <div class="meta-info">
                        <span><i class="fa-solid fa-bread-slice"></i> Fresh</span>
                        <span><i class="fa-solid fa-star"></i> 5.0</span>
                    </div>
                    <div class="price-row">
                        <span class="price">$4.25</span>
                        <div class="add-btn">+</div>
                    </div>
                </div>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active"><i class="fa-solid fa-compass"></i></div>
            <div class="nav-item"><i class="fa-solid fa-magnifying-glass"></i></div>
            <div class="nav-item cart-center"><i class="fa-solid fa-bag-shopping"></i></div>
            <div class="nav-item"><i class="fa-solid fa-heart"></i></div>
            <div class="nav-item"><i class="fa-solid fa-user"></i></div>
        </nav>
    </div>

</body>
</html>
