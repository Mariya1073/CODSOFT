<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Signup Flow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <div class="screen">
            <div class="header">
                <h1>Welcome.</h1>
                <p>Start your journey with us.</p>
            </div>
            <div class="action-area">
                <button class="btn btn-dark">Create Account</button>
                <button class="btn btn-outline">Sign in with Google</button>
            </div>
            <p class="footer">Already a member? <a href="#">Login</a></p>
        </div>

        <div class="screen">
            <div class="header">
                <h1>Join.</h1>
                <p>Enter your details below.</p>
            </div>
            <div class="form-group">
                <input type="text" placeholder="Full Name">
                <input type="email" placeholder="Email Address">
                <input type="password" placeholder="Password">
            </div>
            <button class="btn btn-dark">Register</button>
            <p class="footer">By joining, you agree to our <a href="#">Terms</a></p>
        </div>

        <div class="screen">
            <div class="header">
                <h1>Hello.</h1>
                <p>Welcome back, please login.</p>
            </div>
            <div class="form-group">
                <input type="email" placeholder="Email Address">
                <input type="password" placeholder="Password">
            </div>
            <a href="#" class="link-small">Forgot password?</a>
            <button class="btn btn-dark">Login</button>
            <p class="footer">New here? <a href="#">Create account</a></p>
        </div>
    </div>

</body>
</html>
